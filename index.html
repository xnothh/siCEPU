<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | siCepu Tracker</title>
    <link rel="stylesheet" href="/sytle/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/logo_nexus.png" type="image/png">
</head>
<body>

<div class="app-container">
    <header>
        <div>
            <img src="assets/AriyA_gift.gif" class="header-logo-l" alt="Logo L">
            <img src="assets/aditfams_gif.gif" class="header-logo-k" alt="Logo R">
            <!-- <img src="assets/logo_nexus.png" class="header-logo-k" alt="Logo R"> -->
            <!-- <img src="assets/aditfams_gif.gif" class="header-logo-k" alt="Logo R">
            <img src="assets/aditfams_gif.gif" class="header-logo-k" alt="Logo R">
            <img src="assets/aditfams_gif.gif" class="header-logo-k" alt="Logo R">
            <img src="assets/aditfams_gif.gif" class="header-logo-k" alt="Logo R">
            <img src="assets/aditfams_gif.gif" class="header-logo-k" alt="Logo R"> -->
            <h1 class="nxs">SatuMimpi Tracker | by SiRoi</h1>
        </div>
        <div class="status-badge">
            <span class="dot"></span> Online
        </div>
        <div class="server-selector">
        <select id="serverSelect">
            <option value="3e3gdb">SatuMimpi (Default)</option>
            <option value="98yrzem">Jing Arena</option>
            <option value="zrvmg4">IME Roleplay</option>
            <option value="vgaqm5">Garuda Prime RP</option>
        </select>
    </div>
    </header>

    <div class="search-section">
        <input type="text" id="playerName" placeholder="Cari nama pemain..." autocomplete="off">
        <button id="searchBtn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>

    <div id="info-text"></div>

    <div class="layout-wrapper">
        <div class="table-wrapper" id="listContainer">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pemain</th>
                        <th>Ping</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="/script/script.js"></script>
</body>
</html>
